<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}My Agent App{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            line-height: 1.6;
        }
        header {
            background: #1e293b;
            border-bottom: 1px solid #334155;
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        header a {
            color: #e2e8f0;
            text-decoration: none;
        }
        header h1 { font-size: 1.25rem; font-weight: 600; }
        header nav { margin-left: auto; }
        header nav a {
            color: #94a3b8;
            margin-left: 1.5rem;
            font-size: 0.875rem;
        }
        header nav a:hover { color: #e2e8f0; }
        main {
            max-width: 960px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }
        .badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .badge-processing { background: #1e3a5f; color: #60a5fa; }
        .badge-complete { background: #14532d; color: #4ade80; }
        .badge-incomplete { background: #7c2d12; color: #fb923c; }
        .badge-executing { background: #3b0764; color: #c084fc; }
        .badge-executed { background: #052e16; color: #22c55e; }
        .badge-execution-failed, .badge-execution_failed { background: #450a0a; color: #f87171; }
        .btn {
            display: inline-block;
            padding: 0.5rem 1.25rem;
            border-radius: 6px;
            font-size: 0.875rem;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            border: none;
        }
        .btn-primary { background: #2563eb; color: #fff; }
        .btn-primary:hover { background: #1d4ed8; }
        .empty-state {
            text-align: center;
            padding: 4rem 1rem;
            color: #64748b;
        }
        .empty-state p { font-size: 1.1rem; }
        {% block extra_style %}{% endblock %}
    </style>
</head>
<body>
    <header>
        <a href="/"><h1>My Agent App</h1></a>
        <nav>
            <a href="/reports">Relatórios</a>
            <a href="/api/health">Health</a>
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
